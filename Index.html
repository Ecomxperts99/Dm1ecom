<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DigiVardhan Marketing – Political Digital Campaign</title>
<meta name="description" content="AI Campaign Videos, Cinematic Reels, Motion Graphics & Political Social Media Content. DigiVardhan Marketing – Your trusted political digital campaign partner.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Noto+Sans+Devanagari:wght@400;600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #D32F2F;
  --gold-light: #FF5252;
  --saffron: #8B0000;
  --saffron-light: #C62828;
  --dark: #0A0C14;
  --dark2: #0D1020;
  --dark3: #121628;
  --dark4: #1A2040;
  --card-bg: #0F1422;
  --text: #F5F5F5;
  --text-muted: #333333;
  --border: rgba(211,47,47,0.22);
  --glow: 0 0 30px rgba(211,47,47,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  cursor: default;
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--dark); }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }

/* ── NOISE TEXTURE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: .5;
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 5%;
  background: linear-gradient(180deg, rgba(10,12,20,0.98) 0%, rgba(10,12,20,0) 100%);
  backdrop-filter: blur(6px);
  border-bottom: 1px solid rgba(211,47,47,0.08);
  transition: all .3s;
}
nav.scrolled {
  background: rgba(10,12,20,0.97);
  border-bottom-color: var(--border);
  box-shadow: 0 4px 30px rgba(0,0,0,0.6);
}
.nav-logo img {
  height: 52px;
  width: auto;
  display: block;
}
.nav-links { display: flex; gap: 28px; list-style: none; }
.nav-links a {
  color: #333333; text-decoration: none;
  font-size: .9rem; font-weight: 600; letter-spacing: .5px;
  transition: color .2s;
}
.nav-links a:hover { color: var(--gold-light); }
.nav-cta {
  background: linear-gradient(135deg, var(--gold), var(--saffron-light));
  color: #fff !important; padding: 8px 20px; border-radius: 4px;
  font-weight: 700 !important;
}

/* ── SECTION SPACING ── */
section { padding: 90px 5%; }

/* ── HEADINGS ── */
.section-label {
  font-size: .75rem; font-weight: 700; letter-spacing: 4px;
  color: var(--gold-light); text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::before, .section-label::after {
  content: ''; flex: 1; max-width: 40px; height: 1px; background: var(--gold);
}
.section-title {
  font-family: 'Cinzel', serif; font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 900; line-height: 1.15;
  background: linear-gradient(135deg, #fff 40%, var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 18px;
}
.devanagari {
  font-family: 'Noto Sans Devanagari', sans-serif;
}

/* ── BUTTONS ── */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 30px; border-radius: 4px; font-weight: 700;
  font-size: 1rem; letter-spacing: .5px; cursor: pointer;
  text-decoration: none; transition: all .3s; border: none;
}
.btn-primary {
  background: linear-gradient(135deg, var(--gold), var(--saffron-light));
  color: #fff;
  box-shadow: 0 4px 20px rgba(211,47,47,0.4);
}
.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(211,47,47,0.6);
}
.btn-outline {
  border: 2px solid var(--gold); color: var(--gold-light); background: transparent;
}
.btn-outline:hover { background: rgba(211,47,47,0.1); transform: translateY(-2px); }
.btn-wa { background: #25D366; color: #fff; }
.btn-wa:hover { background: #1ebe5d; transform: translateY(-2px); }
.btn-call { background: var(--gold); color: #fff; }
.btn-call:hover { background: var(--gold-light); transform: translateY(-2px); }

/* ── DIVIDER ── */
.gold-divider {
  width: 60px; height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 2px; margin: 20px auto;
}

/* ════════════════════════════════
   HERO
════════════════════════════════ */
#hero {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 120px 5% 80px;
  position: relative; overflow: hidden;
}
.hero-bg {
  position: absolute; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 0%, rgba(211,47,47,0.14) 0%, transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(139,0,0,0.10) 0%, transparent 60%),
    linear-gradient(180deg, #0A0C14 0%, #080C1A 100%);
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(211,47,47,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(211,47,47,0.05) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at center, black 30%, transparent 80%);
}
.hero-particles {
  position: absolute; inset: 0; overflow: hidden;
}
.particle {
  position: absolute; width: 2px; height: 2px;
  background: var(--gold-light); border-radius: 50%;
  animation: float linear infinite;
  opacity: 0;
}
@keyframes float {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: .6; }
  90% { opacity: .2; }
  100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
}
.hero-content { position: relative; z-index: 2; max-width: 900px; }

.hero-tagline {
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: clamp(1rem, 2vw, 1.2rem);
  color: var(--gold-light); font-weight: 600;
  margin-bottom: 24px; letter-spacing: .5px;
  animation: fadeDown .8s ease both;
}
.hero-main-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(2.8rem, 6vw, 5rem);
  font-weight: 900; line-height: 1.05;
  letter-spacing: -1px;
  background: linear-gradient(135deg, #FFFFFF 0%, var(--gold-light) 50%, #FF5252 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  animation: fadeDown .8s .2s ease both;
  margin-bottom: 16px;
}
.hero-subtitle {
  font-size: clamp(1rem, 2vw, 1.25rem);
  color: var(--gold-light); font-weight: 700; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 20px;
  animation: fadeDown .8s .35s ease both;
}
.hero-desc {
  font-size: 1.05rem; color: #333333; max-width: 600px;
  margin: 0 auto 16px; line-height: 1.7;
  animation: fadeDown .8s .5s ease both;
}
.hero-marathi {
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: 1rem; color: #333333; max-width: 650px;
  margin: 0 auto 40px; line-height: 1.8;
  animation: fadeDown .8s .6s ease both;
}
.hero-btns {
  display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
  animation: fadeDown .8s .75s ease both;
}
.hero-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(211,47,47,0.10); border: 1px solid var(--border);
  border-radius: 100px; padding: 6px 18px;
  font-size: .82rem; color: var(--gold-light); letter-spacing: 1px;
  margin-bottom: 32px;
  animation: fadeDown .8s .1s ease both;
}
.badge-dot { width: 7px; height: 7px; background: var(--gold-light); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

@keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ── SCROLL INDICATOR ── */
.scroll-ind {
  position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  font-size: .7rem; color: #333333; letter-spacing: 2px; z-index: 2;
}
.scroll-arrow {
  width: 1px; height: 40px; background: linear-gradient(180deg, transparent, var(--gold));
  animation: scrollPulse 2s infinite;
}
@keyframes scrollPulse { 0%,100%{opacity:.3;transform:scaleY(.5)} 50%{opacity:1;transform:scaleY(1)} }

/* ════════════════════════════════
   TRUST STRIP
════════════════════════════════ */
#trust-strip {
  padding: 28px 5%;
  background: linear-gradient(90deg, transparent, rgba(211,47,47,0.07), transparent);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-wrap: wrap; gap: 32px;
}
.trust-item {
  display: flex; align-items: center; gap: 10px;
  font-size: .9rem; color: #333333; font-weight: 600;
}
.trust-icon { font-size: 1.4rem; }

/* ════════════════════════════════
   ABOUT
════════════════════════════════ */
#about {
  background: var(--dark2);
  position: relative;
}
#about::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
  background: linear-gradient(180deg, var(--gold), var(--gold-light), transparent);
}
.about-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 64px; align-items: center; max-width: 1200px; margin: 0 auto;
}
.about-img-wrap {
  position: relative; aspect-ratio: 3/4; overflow: hidden;
  border: 1px solid var(--border); border-radius: 2px;
  max-height: 480px; width: 100%;
}
.about-img-placeholder {
  width: 100%; height: 100%;
  background: var(--dark3);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: #333333;
  font-size: .9rem;
}
.about-img-placeholder span { font-size: 3rem; }
.about-corner {
  position: absolute;
  width: 40px; height: 40px;
  border-color: var(--gold);
  border-style: solid;
}
.about-corner.tl { top: -8px; left: -8px; border-width: 2px 0 0 2px; }
.about-corner.br { bottom: -8px; right: -8px; border-width: 0 2px 2px 0; }

.about-text .section-label { justify-content: flex-start; }
.about-text .section-label::after { display: none; }
.about-text .section-title { text-align: left; }
.about-body {
  font-size: 1.05rem; line-height: 1.8; color: #333333;
  margin-bottom: 28px;
}
.about-stats {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 20px; margin-bottom: 32px;
}
.stat-box {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 20px; text-align: center; border-radius: 4px;
}
.stat-num {
  font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 900;
  color: var(--gold-light); display: block;
}
.stat-label { font-size: .8rem; color: #333333; letter-spacing: 1px; margin-top: 4px; }

/* ════════════════════════════════
   SERVICES
════════════════════════════════ */
#services { background: var(--dark); }
.services-header { text-align: center; max-width: 700px; margin: 0 auto 56px; }
.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px; max-width: 1200px; margin: 0 auto 48px;
}
.service-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 32px 24px;
  position: relative; overflow: hidden;
  transition: all .35s; cursor: default;
  border-radius: 2px;
}
.service-card::before {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  transform: scaleX(0); transform-origin: left;
  transition: transform .35s;
}
.service-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(211,47,47,0.06), transparent);
  opacity: 0; transition: opacity .35s;
}
.service-card:hover { transform: translateY(-6px); border-color: rgba(211,47,47,0.5); box-shadow: 0 20px 40px rgba(0,0,0,0.4), var(--glow); }
.service-card:hover::before { transform: scaleX(1); }
.service-card:hover::after { opacity: 1; }
.service-icon { font-size: 2.4rem; margin-bottom: 16px; display: block; }
.service-name {
  font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700;
  color: var(--text); margin-bottom: 10px; letter-spacing: .5px;
}
.service-desc { font-size: .87rem; color: #333333; line-height: 1.6; }
.service-num {
  position: absolute; top: 20px; right: 20px;
  font-size: .65rem; color: rgba(211,47,47,0.35);
  font-family: 'Cinzel', serif; font-weight: 700; letter-spacing: 2px;
}

/* ════════════════════════════════
   CTA STRIP
════════════════════════════════ */
.cta-strip {
  padding: 48px 5%;
  background: linear-gradient(135deg, rgba(211,47,47,0.09), rgba(139,0,0,0.07));
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 24px;
}
.cta-strip-text h3 {
  font-family: 'Cinzel', serif; font-size: 1.5rem; font-weight: 700;
  background: linear-gradient(90deg, #fff, var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.cta-strip-text p { color: #333333; font-size: .95rem; margin-top: 6px; }
.urgency-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(211,47,47,0.12); border: 1px solid rgba(211,47,47,0.4);
  border-radius: 100px; padding: 8px 20px;
  color: var(--gold-light); font-size: .85rem; font-weight: 700;
  letter-spacing: .5px;
}
.urgency-dot { width: 8px; height: 8px; background: var(--gold); border-radius: 50%; animation: pulse 1s infinite; }

/* ════════════════════════════════
   DOCUMENTARY
════════════════════════════════ */
#documentary {
  padding: 0; position: relative; overflow: hidden;
}
.doc-overlay {
  position: relative; background: #000;
}
.doc-top-fade {
  position: absolute; top: 0; left: 0; right: 0; height: 120px; z-index: 2;
  background: linear-gradient(180deg, var(--dark) 0%, transparent 100%);
}
.doc-bottom-fade {
  position: absolute; bottom: 0; left: 0; right: 0; height: 120px; z-index: 2;
  background: linear-gradient(0deg, var(--dark) 0%, transparent 100%);
}
.doc-title {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 3; text-align: center; pointer-events: none;
}
.doc-label {
  font-size: .7rem; letter-spacing: 5px; color: var(--gold-light);
  text-transform: uppercase; margin-bottom: 10px;
}
.doc-heading {
  font-family: 'Cinzel', serif; font-size: clamp(2rem, 5vw, 4rem);
  font-weight: 900; color: #fff; text-shadow: 0 4px 30px rgba(0,0,0,0.8);
  letter-spacing: 2px;
}
.doc-subline { color: rgba(255,255,255,.6); font-size: 1rem; margin-top: 8px; }
.youtube-embed {
  width: 100%; aspect-ratio: 16/9;
  opacity: .5; filter: brightness(.7);
  transition: opacity .3s, filter .3s;
}
.youtube-embed:hover { opacity: .65; filter: brightness(.8); }

/* ════════════════════════════════
   SHORTS SLIDER
════════════════════════════════ */
#shorts { background: var(--dark2); }
.shorts-header { text-align: center; margin-bottom: 48px; }
.slider-section { margin-bottom: 56px; }
.slider-section-title {
  font-size: 1rem; font-weight: 700; color: var(--gold-light);
  letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 24px; padding-left: 16px;
  border-left: 3px solid var(--gold);
}
.slider-wrap {
  overflow: hidden; position: relative;
}
.slider-track {
  display: flex; gap: 16px;
  transition: transform .4s cubic-bezier(.25,.8,.25,1);
}
.short-card {
  flex: 0 0 calc(33.33% - 11px);
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 4px; overflow: hidden; position: relative;
}
.short-embed {
  width: 100%; aspect-ratio: 9/16;
  pointer-events: all;
}
.slider-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(211,47,47,.9); border: none; border-radius: 50%;
  width: 44px; height: 44px; cursor: pointer; z-index: 10;
  color: #fff; font-size: 1.2rem; display: flex; align-items: center; justify-content: center;
  transition: all .2s;
}
.slider-btn:hover { background: var(--gold); transform: translateY(-50%) scale(1.1); }
.slider-btn.prev { left: -22px; }
.slider-btn.next { right: -22px; }

/* ════════════════════════════════
   GALLERY
════════════════════════════════ */
#gallery { background: var(--dark); }
.gallery-header { text-align: center; margin-bottom: 48px; }
.gallery-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 20px; max-width: 1000px; margin: 0 auto 48px;
}
.gallery-img-wrap {
  aspect-ratio: 4/3; background: var(--card-bg);
  border: 1px solid var(--border); border-radius: 2px;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: #333333;
  transition: all .3s;
}
.gallery-img-wrap:hover { border-color: rgba(211,47,47,.5); box-shadow: var(--glow); }
.gallery-img-wrap span { font-size: 2.5rem; }
.gallery-img-wrap p { font-size: .9rem; }

/* ════════════════════════════════
   IMPACT LINE
════════════════════════════════ */
#impact {
  text-align: center; padding: 80px 5%;
  background: linear-gradient(135deg, rgba(211,47,47,0.07), rgba(139,0,0,0.05));
  position: relative; overflow: hidden;
}
#impact::before {
  content: '॥';
  position: absolute; font-size: 20rem; font-family: 'Noto Sans Devanagari', sans-serif;
  color: rgba(211,47,47,0.04); top: 50%; left: 50%;
  transform: translate(-50%,-50%);
}
.impact-text {
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: clamp(1.6rem, 4vw, 3rem);
  font-weight: 800; line-height: 1.4;
  background: linear-gradient(135deg, #fff, var(--gold-light), #FF5252);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  position: relative; z-index: 1;
}
.impact-sub {
  font-size: 1rem; color: #333333; margin-top: 16px;
  letter-spacing: 2px; text-transform: uppercase;
}

/* ════════════════════════════════
   TRUSTED
════════════════════════════════ */
#trusted { background: var(--dark2); text-align: center; }
.trusted-header { margin-bottom: 48px; }
.leaders-grid {
  display: grid; grid-template-columns: repeat(auto-fill,minmax(180px,1fr));
  gap: 16px; max-width: 1000px; margin: 0 auto 48px;
}
.leader-card {
  background: var(--card-bg); border: 1px solid var(--border);
  padding: 24px 16px; border-radius: 2px; text-align: center;
  transition: all .3s;
}
.leader-card:hover { border-color: rgba(211,47,47,.4); transform: translateY(-4px); }
.leader-avatar {
  width: 60px; height: 60px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(211,47,47,.2), rgba(255,82,82,.2));
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; margin: 0 auto 12px;
}
.leader-name { font-weight: 700; font-size: .95rem; color: var(--text); margin-bottom: 4px; }
.leader-title { font-size: .78rem; color: #333333; }
.stars { color: var(--gold-light); font-size: .85rem; margin-top: 8px; }

/* ════════════════════════════════
   CONTACT
════════════════════════════════ */
#contact {
  background: var(--dark);
  text-align: center;
  position: relative; overflow: hidden;
}
#contact::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(211,47,47,0.07) 0%, transparent 70%);
}
.contact-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
.contact-body {
  font-size: 1.05rem; color: #333333; line-height: 1.8; margin-bottom: 40p
